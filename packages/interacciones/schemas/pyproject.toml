[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "interacciones-schemas"
version = "0.1.0"
description = "Type-safe interaction schemas for multi-agent coordination"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "pydantic>=2.0",
    "python-dateutil>=2.8",
    "httpx>=0.25.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "pytest-asyncio>=0.21",
    "mypy>=1.5",
    "black>=23.0",
    "ruff>=0.1",
    "respx>=0.20",  # For httpx mocking in tests
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"interacciones.schemas" = ["avro/*.avsc"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["src"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"
