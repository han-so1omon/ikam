[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "interacciones-graph"
version = "0.1.0"
description = "Universal graph execution engine with typed state and conditional routing"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "interacciones-schemas>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "pytest-asyncio>=0.21",
    "mypy>=1.5",
    "black>=23.0",
    "ruff>=0.1",
]
postgres = [
    "asyncpg>=0.29.0",
]
llm = [
    "openai>=1.0",
    "anthropic>=0.7",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"
