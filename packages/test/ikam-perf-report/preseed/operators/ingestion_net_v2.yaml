  - name: "net.ingestion.arc.parse_chunk_to_chunks_parsed"
    mime_type: "application/vnd.ikam.ir.proposition+yaml"
    value:
      ir_profile: "PropositionIR"
      subject: "${ref:net.ingestion.transition.parse_chunk}"
      predicate: "outputs_to"
      object: "${ref:net.ingestion.place.chunks_parsed}"

  - name: "net.ingestion.arc.chunks_parsed_to_parse_entities_and_relationships"
    mime_type: "application/vnd.ikam.ir.proposition+yaml"
    value:
      ir_profile: "PropositionIR"
      subject: "${ref:net.ingestion.place.chunks_parsed}"
      predicate: "provides_input_to"
      object: "${ref:net.ingestion.transition.parse_entities_and_relationships}"

  - name: "net.ingestion.arc.parse_entities_and_relationships_to_entities_and_relationships_parsed"
    mime_type: "application/vnd.ikam.ir.proposition+yaml"
    value:
      ir_profile: "PropositionIR"
      subject: "${ref:net.ingestion.transition.parse_entities_and_relationships}"
      predicate: "outputs_to"
