graph_id: "modelado/projects/canonical/nets"
fragments:
  - name: "net.ingestion.place.artifacts_ready"
    mime_type: "application/vnd.ikam.ir.structured-data+yaml"
    value:
      ir_profile: "StructuredDataIR"
      kind: "place"
      label: "Artifacts Ready"

  - name: "net.ingestion.place.fragments_lifted"
    mime_type: "application/vnd.ikam.ir.structured-data+yaml"
    value:
      ir_profile: "StructuredDataIR"
      kind: "place"
      label: "Fragments Lifted"

  - name: "net.ingestion.place.documents_loaded"
    mime_type: "application/vnd.ikam.ir.structured-data+yaml"
    value:
      ir_profile: "StructuredDataIR"
      kind: "place"
      label: "Documents Loaded"

  - name: "net.ingestion.place.chunks_parsed"
