      ir_profile: "StructuredDataIR"
      kind: "place"
      label: "Chunks Parsed"

  - name: "net.ingestion.place.entities_and_relationships_parsed"
    mime_type: "application/vnd.ikam.ir.structured-data+yaml"
    value:
      ir_profile: "StructuredDataIR"
      kind: "place"
      label: "Entities And Relationships Parsed"

  - name: "net.ingestion.place.claims_parsed"
    mime_type: "application/vnd.ikam.ir.structured-data+yaml"
    value:
      ir_profile: "StructuredDataIR"
      kind: "place"
      label: "Claims Parsed"

  - name: "net.ingestion.transition.parse_artifacts"
    mime_type: "application/vnd.ikam.ir.structured-data+yaml"
    value:
      ir_profile: "StructuredDataIR"
      kind: "transition"
      label: "Parse Artifacts"

  - name: "net.ingestion.transition.lift_fragments"
    mime_type: "application/vnd.ikam.ir.structured-data+yaml"
    value:
      ir_profile: "StructuredDataIR"
      kind: "transition"
      label: "Lift Fragments"

  - name: "net.ingestion.transition.load_documents"
    mime_type: "application/vnd.ikam.ir.structured-data+yaml"
    value:
      ir_profile: "StructuredDataIR"
      kind: "transition"
      label: "Load Documents"

  - name: "net.ingestion.transition.parse_chunk"
    mime_type: "application/vnd.ikam.ir.structured-data+yaml"
    value:
      ir_profile: "StructuredDataIR"
      kind: "transition"
      label: "Parse Chunk"

  - name: "net.ingestion.transition.parse_entities_and_relationships"
    mime_type: "application/vnd.ikam.ir.structured-data+yaml"
    value:
      ir_profile: "StructuredDataIR"
      kind: "transition"
      label: "Parse Entities And Relationships"

  - name: "net.ingestion.transition.parse_claims"
    mime_type: "application/vnd.ikam.ir.structured-data+yaml"
    value:
      ir_profile: "StructuredDataIR"
      kind: "transition"
      label: "Parse Claims"

  - name: "net.ingestion.arc.artifacts_to_parse"
    mime_type: "application/vnd.ikam.ir.proposition+yaml"
    value:
      ir_profile: "PropositionIR"
      subject: "${ref:net.ingestion.place.artifacts_ready}"
      predicate: "provides_input_to"
      object: "${ref:net.ingestion.transition.parse_artifacts}"

  - name: "net.ingestion.arc.parse_to_lift"
    mime_type: "application/vnd.ikam.ir.proposition+yaml"
    value:
      ir_profile: "PropositionIR"
      subject: "${ref:net.ingestion.transition.parse_artifacts}"
      predicate: "provides_input_to"
      object: "${ref:net.ingestion.transition.lift_fragments}"

  - name: "net.ingestion.arc.lift_to_fragments_ready"
    mime_type: "application/vnd.ikam.ir.proposition+yaml"
    value:
      ir_profile: "PropositionIR"
      subject: "${ref:net.ingestion.transition.lift_fragments}"
      predicate: "outputs_to"
      object: "${ref:net.ingestion.place.fragments_lifted}"

  - name: "net.ingestion.link.parse_artifacts_exec"
    mime_type: "application/vnd.ikam.ir.proposition+yaml"
    value:
      ir_profile: "PropositionIR"
      subject: "${ref:net.ingestion.transition.parse_artifacts}"
      predicate: "executed_by_operator"
      object: "${ref:op_parse_artifacts_expr}"

  - name: "net.ingestion.link.lift_fragments_exec"
    mime_type: "application/vnd.ikam.ir.proposition+yaml"
    value:
      ir_profile: "PropositionIR"
      subject: "${ref:net.ingestion.transition.lift_fragments}"
      predicate: "executed_by_operator"
      object: "${ref:op_lift_fragments_expr}"

