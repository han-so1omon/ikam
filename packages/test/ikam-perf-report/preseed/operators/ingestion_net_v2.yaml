    value:
      ir_profile: "PropositionIR"
      subject: "${ref:net.ingestion.place.artifacts_ready}"
      predicate: "provides_input_to"
      object: "${ref:net.ingestion.transition.load_documents}"

  - name: "net.ingestion.arc.load_documents_to_documents_loaded"
    mime_type: "application/vnd.ikam.ir.proposition+yaml"
    value:
      ir_profile: "PropositionIR"
      subject: "${ref:net.ingestion.transition.load_documents}"
      predicate: "outputs_to"
      object: "${ref:net.ingestion.place.documents_loaded}"

  - name: "net.ingestion.arc.documents_loaded_to_parse_chunk"
    mime_type: "application/vnd.ikam.ir.proposition+yaml"
    value:
      ir_profile: "PropositionIR"
      subject: "${ref:net.ingestion.place.documents_loaded}"
      predicate: "provides_input_to"
