    value:
      ir_profile: "PropositionIR"
      subject: "${ref:net.ingestion.transition.parse_chunk}"
      predicate: "executed_by_operator"
      object: "${ref:op_parse_chunk_expr}"

  - name: "net.ingestion.link.parse_entities_and_relationships_exec"
    mime_type: "application/vnd.ikam.ir.proposition+yaml"
    value:
      ir_profile: "PropositionIR"
      subject: "${ref:net.ingestion.transition.parse_entities_and_relationships}"
      predicate: "executed_by_operator"
      object: "${ref:op_parse_entities_and_relationships_expr}"

  - name: "net.ingestion.link.parse_claims_exec"
    mime_type: "application/vnd.ikam.ir.proposition+yaml"
    value:
      ir_profile: "PropositionIR"
      subject: "${ref:net.ingestion.transition.parse_claims}"
      predicate: "executed_by_operator"
      object: "${ref:op_parse_claims_expr}"

  - name: "net.ingestion.head"
    mime_type: "application/vnd.ikam.ir.structured-data+yaml"
    value:
      ir_profile: "StructuredDataIR"
      profile: "petri_net"
      name: "canonical_ingestion"
      places:
        artifacts_ready: "${ref:net.ingestion.place.artifacts_ready}"
        documents_loaded: "${ref:net.ingestion.place.documents_loaded}"
        chunks_parsed: "${ref:net.ingestion.place.chunks_parsed}"
        entities_and_relationships_parsed: "${ref:net.ingestion.place.entities_and_relationships_parsed}"
        claims_parsed: "${ref:net.ingestion.place.claims_parsed}"
        fragments_lifted: "${ref:net.ingestion.place.fragments_lifted}"
      transitions:
        load_documents: "${ref:net.ingestion.transition.load_documents}"
        parse_chunk: "${ref:net.ingestion.transition.parse_chunk}"
        parse_entities_and_relationships: "${ref:net.ingestion.transition.parse_entities_and_relationships}"
        parse_claims: "${ref:net.ingestion.transition.parse_claims}"
        parse_artifacts: "${ref:net.ingestion.transition.parse_artifacts}"
        lift_fragments: "${ref:net.ingestion.transition.lift_fragments}"
