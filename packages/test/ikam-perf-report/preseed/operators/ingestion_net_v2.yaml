  - name: "net.ingestion.arc.entities_and_relationships_parsed_to_parse_claims"
    mime_type: "application/vnd.ikam.ir.proposition+yaml"
    value:
      ir_profile: "PropositionIR"
      subject: "${ref:net.ingestion.place.entities_and_relationships_parsed}"
      predicate: "provides_input_to"
      object: "${ref:net.ingestion.transition.parse_claims}"

  - name: "net.ingestion.arc.parse_claims_to_claims_parsed"
    mime_type: "application/vnd.ikam.ir.proposition+yaml"
    value:
      ir_profile: "PropositionIR"
      subject: "${ref:net.ingestion.transition.parse_claims}"
      predicate: "outputs_to"
      object: "${ref:net.ingestion.place.claims_parsed}"

  - name: "net.ingestion.link.load_documents_exec"
    mime_type: "application/vnd.ikam.ir.proposition+yaml"
    value:
      ir_profile: "PropositionIR"
      subject: "${ref:net.ingestion.transition.load_documents}"
      predicate: "executed_by_operator"
      object: "${ref:op_load_documents_expr}"

