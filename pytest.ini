[pytest]
asyncio_mode = auto
addopts = --import-mode=importlib --timeout=180
pythonpath =
    packages/test/ikam-perf-report
markers =
    integration: marks tests that require full service stack (Kafka, DB, Auth0)
    performance: marks performance measurement tests (may be slow)
    docker: marks tests that rely on external dockerized services
    slow: marks tests that are intentionally slow (deselect with '-m "not slow"')
norecursedirs = scripts/testing packages/ikam/tests
